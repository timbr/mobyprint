<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mobyprint</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Mobyprint</h1>
            <p>Print from your phone</p>
        </header>

        <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-area" id="uploadArea">
                <span class="icon">&#128424;</span>
                <span class="label">Tap to select a file</span>
                <span class="hint">PDF or DOCX, up to 50 MB</span>
                <input type="file" id="fileInput" name="file" accept=".pdf,.docx">
            </div>

            <div class="options">
                <div class="option-row">
                    <div>
                        <label for="scaleA4">Scale to A4</label>
                        <span class="detail">Fits US Letter pages onto A4 paper without reflowing text</span>
                    </div>
                    <div class="toggle">
                        <input type="checkbox" id="scaleA4" name="scale_a4" value="true" checked>
                        <span class="slider"></span>
                    </div>
                </div>
            </div>

            <div class="progress-container" id="progress">
                <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">Uploading...</div>
            </div>
        </form>

        <div class="status error" id="errorStatus"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const form = document.getElementById('uploadForm');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const errorStatus = document.getElementById('errorStatus');

        // Tap to select
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                submitForm();
            }
        });

        // File selected
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) submitForm();
        });

        function submitForm() {
            const file = fileInput.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            if (!['pdf', 'docx'].includes(ext)) {
                showError('Please select a PDF or DOCX file.');
                return;
            }

            errorStatus.style.display = 'none';
            progress.classList.add('active');
            progressText.textContent = ext === 'docx'
                ? 'Uploading & converting to PDF...'
                : 'Uploading...';

            const formData = new FormData(form);
            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = pct + '%';
                    if (pct === 100 && ext === 'docx') {
                        progressText.textContent = 'Converting to PDF...';
                    }
                }
            });

            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    // Redirect happened — follow it
                    window.location.href = xhr.responseURL;
                } else {
                    try {
                        const resp = JSON.parse(xhr.responseText);
                        showError(resp.error || 'Upload failed.');
                    } catch {
                        showError('Upload failed.');
                    }
                    progress.classList.remove('active');
                }
            });

            xhr.addEventListener('error', () => {
                showError('Network error. Please try again.');
                progress.classList.remove('active');
            });

            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        function showError(msg) {
            errorStatus.textContent = msg;
            errorStatus.style.display = 'block';
        }
    </script>
</body>
</html>
