services:
  mobyprint:
    build: .
    ports:
      - "8080:80"
    volumes:
      - uploads:/tmp/mobyprint
    restart: unless-stopped
    environment:
      # Pre-fill the printer URL in the web UI.
      # Set this to your printer's IPP address, e.g.:
      #   PRINTER_URL=ipp://192.168.1.100/ipp/print
      - PRINTER_URL=${PRINTER_URL:-}
      - PORT=80

# --------------------------------------------------------------------
# Linux / Raspberry Pi — host networking enables mobyprint.local via mDNS
#
#   docker compose --profile host-net up -d
#
# Access via http://mobyprint.local on any device on the same network.
# Does NOT work on Docker Desktop (Mac / Windows).
# --------------------------------------------------------------------
  mobyprint-mdns:
    build: .
    profiles: [host-net]
    network_mode: host
    volumes:
      - uploads:/tmp/mobyprint
    restart: unless-stopped
    environment:
      - PRINTER_URL=${PRINTER_URL:-}
      - PORT=80

volumes:
  uploads:
